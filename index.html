<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Valentine Winner Card</title>
  <style>
    :root{
      --bg:#05060a;
      --glass: rgba(255,255,255,.06);
      --glass2: rgba(255,255,255,.10);
      --stroke: rgba(255,255,255,.14);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --shadow: 0 30px 90px rgba(0,0,0,.65);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 900px at 50% 10%, rgba(0,255,255,.10), transparent 55%),
                  radial-gradient(900px 700px at 15% 60%, rgba(255,0,255,.10), transparent 60%),
                  radial-gradient(900px 700px at 85% 75%, rgba(255,200,0,.08), transparent 55%),
                  var(--bg);
      overflow:hidden;
    }

    /* ====== Moving glow blobs ====== */
    .blob{
      position:absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      filter: blur(40px);
      opacity:.35;
      mix-blend-mode: screen;
      animation: drift 12s ease-in-out infinite;
      pointer-events:none;
    }
    .b1{background: radial-gradient(circle at 30% 30%, rgba(0,255,255,.9), transparent 60%); left:-120px; top: 10%;}
    .b2{background: radial-gradient(circle at 30% 30%, rgba(255,0,255,.9), transparent 60%); right:-160px; top: 40%; animation-delay:-3s;}
    .b3{background: radial-gradient(circle at 30% 30%, rgba(255,200,0,.75), transparent 60%); left: 25%; bottom:-200px; animation-delay:-6s;}
    @keyframes drift{
      0%,100%{ transform: translate(0,0) scale(1); }
      50%{ transform: translate(80px,-40px) scale(1.12); }
    }

    /* ====== Background particles canvas ====== */
    canvas#sparkles{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
      opacity:.9;
    }

    /* ====== Floating hearts (DOM) ====== */
    .hearts{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }
    .heart-float{
      position:absolute;
      font-size: 14px;
      opacity: 0;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,.35));
      animation: floatUp linear forwards;
      will-change: transform, opacity;
    }
    @keyframes floatUp{
      0%   { transform: translate3d(0, 20px, 0) scale(.8) rotate(0deg); opacity: 0; }
      10%  { opacity: .85; }
      60%  { opacity: .85; }
      100% { transform: translate3d(var(--dx), -120vh, 0) scale(1.45) rotate(var(--rot)); opacity: 0; }
    }

    /* ====== Center layout ====== */
    .wrap{
      position:relative;
      height:100%;
      display:grid;
      place-items:center;
      padding: 28px 16px;
    }

    .card{
      width:min(720px, 94vw);
      padding: clamp(18px, 3vw, 34px);
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position:relative;
      overflow:hidden;
      transform: translateY(10px);
      animation: cardIn .9s cubic-bezier(.2,.9,.2,1) forwards;
    }
    @keyframes cardIn{
      from{ opacity:0; transform: translateY(20px) scale(.98);}
      to  { opacity:1; transform: translateY(0) scale(1);}
    }

    /* subtle shimmer */
    .card::before{
      content:"";
      position:absolute;
      inset:-40% -30%;
      background: linear-gradient(120deg,
        transparent 40%,
        rgba(255,255,255,.10) 50%,
        transparent 60%);
      transform: rotate(8deg) translateX(-40%);
      animation: shimmer 6s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes shimmer{
      0%,100%{ transform: rotate(8deg) translateX(-40%); opacity:.25; }
      50%    { transform: rotate(8deg) translateX(40%);  opacity:.35; }
    }

    .topline{
      text-align:center;
      letter-spacing: .34em;
      text-transform: uppercase;
      font-size: 12px;
      color: rgba(255,255,255,.68);
      margin-bottom: 6px;
    }
    .winner{
      text-align:center;
      letter-spacing: .22em;
      text-transform: uppercase;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,.85);
      margin-bottom: 16px;
    }

    .trophies{
      display:flex;
      justify-content:center;
      gap: 10px;
      margin: 10px 0 18px;
      flex-wrap:wrap;
    }
    .trophy{
      width: 40px;
      height: 40px;
      display:grid;
      place-items:center;
      border-radius: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      position:relative;
      overflow:hidden;
      transform: translateY(6px);
      opacity:0;
      animation: pop .6s cubic-bezier(.2,.9,.2,1) forwards;
    }
    .trophy:nth-child(1){ animation-delay: .10s; }
    .trophy:nth-child(2){ animation-delay: .18s; }
    .trophy:nth-child(3){ animation-delay: .26s; }
    .trophy:nth-child(4){ animation-delay: .34s; }
    .trophy:nth-child(5){ animation-delay: .42s; }
    .trophy:nth-child(6){ animation-delay: .50s; }

    .trophy::after{
      content:"";
      position:absolute;
      inset:-40%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.22), transparent 60%);
      transform: rotate(20deg);
      animation: glow 2.2s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes pop{
      to{ transform: translateY(0); opacity:1; }
    }
    @keyframes glow{
      0%,100%{ opacity:.35; transform: translateX(-6px) rotate(20deg); }
      50%{ opacity:.55; transform: translateX(6px) rotate(20deg); }
    }

    .emoji{
      font-size: 20px;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,.45));
      animation: trophyBounce 2.6s ease-in-out infinite;
    }
    .trophy:nth-child(odd) .emoji{ animation-delay: -.7s; }
    @keyframes trophyBounce{
      0%,100%{ transform: translateY(0) rotate(0deg); }
      50%{ transform: translateY(-3px) rotate(-2deg); }
    }

    .name{
      text-align:center;
      font-size: clamp(22px, 4.1vw, 40px);
      line-height: 1.12;
      font-weight: 800;
      margin: 12px 0 18px;
      text-shadow: 0 18px 40px rgba(0,0,0,.55);
    }

    .center{
      display:grid;
      place-items:center;
      margin: 18px 0 18px;
    }

    /* ====== Big heart with glow ====== */
    .big-heart{
      width: 140px;
      height: 140px;
      display:grid;
      place-items:center;
      border-radius: 999px;
      position:relative;
      transform: translateZ(0);
      animation: heartbeat 1.15s ease-in-out infinite;
    }
    .big-heart::before{
      content:"";
      position:absolute;
      inset:-28px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,0,90,.22), transparent 62%);
      filter: blur(2px);
      animation: pulse 1.15s ease-in-out infinite;
    }
    .big-heart span{
      font-size: 72px;
      filter: drop-shadow(0 18px 28px rgba(0,0,0,.55));
      text-shadow: 0 0 24px rgba(255,0,90,.35);
    }
    @keyframes heartbeat{
      0%,100%{ transform: scale(1); }
      30%{ transform: scale(1.08); }
      55%{ transform: scale(0.98); }
      75%{ transform: scale(1.06); }
    }
    @keyframes pulse{
      0%,100%{ opacity:.75; transform: scale(1); }
      50%{ opacity:1; transform: scale(1.08); }
    }

    .quote{
      text-align:center;
      font-size: clamp(14px, 2.1vw, 18px);
      color: rgba(255,255,255,.80);
      margin-top: 12px;
    }

    .divider{
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
      margin: 18px 0 14px;
    }

    .footer{
      display:flex;
      justify-content:center;
      gap: 8px;
      color: rgba(255,255,255,.60);
      font-size: 14px;
      flex-wrap:wrap;
      text-align:center;
    }
    .footer .love{
      filter: drop-shadow(0 10px 12px rgba(0,0,0,.35));
      animation: tinyPulse 1.4s ease-in-out infinite;
    }
    @keyframes tinyPulse{
      0%,100%{ transform: scale(1); }
      50%{ transform: scale(1.18); }
    }

    /* small floating highlight dots inside card */
    .card-dots{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.5;
      mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 78%);
    }
    .dot{
      position:absolute;
      width: 8px; height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.22);
      filter: blur(.2px);
      animation: dotFloat 5.5s ease-in-out infinite;
    }
    @keyframes dotFloat{
      0%,100%{ transform: translateY(0); opacity:.22; }
      50%{ transform: translateY(-10px); opacity:.48; }
    }

    /* responsive tweaks */
    @media (max-width:420px){
      .trophy{ width: 38px; height: 38px; border-radius: 12px; }
      .big-heart{ width: 125px; height: 125px; }
      .big-heart span{ font-size: 66px; }
      .topline{ letter-spacing:.28em; }
    }
  </style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <canvas id="sparkles"></canvas>
  <div class="hearts" id="hearts"></div>

  <main class="wrap">
    <section class="card" role="group" aria-label="Valentine card">
      <div class="topline">VALENTINE'S DAY 2026</div>
      <div class="winner">WINNER</div>

      <div class="trophies" aria-hidden="true">
        <div class="trophy"><div class="emoji">🏆</div></div>
        <div class="trophy"><div class="emoji">🏆</div></div>
        <div class="trophy"><div class="emoji">🏆</div></div>
        <div class="trophy"><div class="emoji">🏆</div></div>
        <div class="trophy"><div class="emoji">🏆</div></div>
        <div class="trophy"><div class="emoji">🏆</div></div>
      </div>

      <h1 class="name" id="name">Dilawar Hussain S/O Zulfiqar Ali</h1>

      <div class="center">
        <div class="big-heart" title="love">
          <span>❤️</span>
        </div>
      </div>

      <p class="quote">The Art of Coding is the Art of Love.</p>

      <div class="divider"></div>

      <div class="footer">
        <span>made with</span>
        <span class="love">❤️</span>
        <span>for SoloLearn and SoloLearners</span>
      </div>

      <div class="card-dots" aria-hidden="true" id="cardDots"></div>
    </section>
  </main>

  <script>
    // ====== Editable text (быстро поменять имя/текст) ======
    // document.getElementById('name').textContent = 'ТВОЁ ИМЯ';

    // ====== Floating hearts generator ======
    const heartsLayer = document.getElementById('hearts');
    const heartChars = ["💗","💖","💘","💝","💞","❤️","💜","💙","💚"];
    function spawnHeart(){
      const el = document.createElement('div');
      el.className = 'heart-float';
      el.textContent = heartChars[Math.floor(Math.random()*heartChars.length)];

      const x = Math.random() * 100;              // vw
      const size = 10 + Math.random() * 20;       // px
      const dur = 6 + Math.random() * 7;          // s
      const dx = (Math.random()*2 - 1) * 120;     // px
      const rot = (Math.random()*2 - 1) * 70;     // deg

      el.style.left = x + 'vw';
      el.style.bottom = (-20 - Math.random()*40) + 'px';
      el.style.fontSize = size + 'px';
      el.style.animationDuration = dur + 's';
      el.style.setProperty('--dx', dx + 'px');
      el.style.setProperty('--rot', rot + 'deg');

      heartsLayer.appendChild(el);
      setTimeout(()=> el.remove(), dur*1000 + 200);
    }
    // частота сердечек
    setInterval(spawnHeart, 240);

    // ====== Tiny dots inside card ======
    const dotsWrap = document.getElementById('cardDots');
    for(let i=0;i<18;i++){
      const d = document.createElement('div');
      d.className = 'dot';
      d.style.left = (5 + Math.random()*90) + '%';
      d.style.top  = (8 + Math.random()*84) + '%';
      d.style.animationDelay = (-Math.random()*6) + 's';
      d.style.animationDuration = (4 + Math.random()*5) + 's';
      d.style.opacity = (0.18 + Math.random()*0.35).toFixed(2);
      dotsWrap.appendChild(d);
    }

    // ====== Sparkles canvas particles ======
    const canvas = document.getElementById('sparkles');
    const ctx = canvas.getContext('2d');
    let W, H, DPR;

    function resize(){
      DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      W = canvas.width = Math.floor(window.innerWidth * DPR);
      H = canvas.height = Math.floor(window.innerHeight * DPR);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
    }
    window.addEventListener('resize', resize);
    resize();

    const particles = Array.from({length: 90}, () => makeP());
    function makeP(){
      return {
        x: Math.random()*W,
        y: Math.random()*H,
        r: (0.7 + Math.random()*2.4) * DPR,
        a: 0.15 + Math.random()*0.55,
        vx: (-0.25 + Math.random()*0.5) * DPR,
        vy: (-0.35 + Math.random()*0.7) * DPR,
        tw: 0.002 + Math.random()*0.006
      };
    }

    function step(t){
      ctx.clearRect(0,0,W,H);

      for(const p of particles){
        p.x += p.vx;
        p.y += p.vy;

        if(p.x < -10) p.x = W + 10;
        if(p.x > W + 10) p.x = -10;
        if(p.y < -10) p.y = H + 10;
        if(p.y > H + 10) p.y = -10;

        const alpha = p.a + Math.sin(t*p.tw) * 0.18;

        // simple glow circle
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r*2.6, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${Math.max(0, alpha*0.10)})`;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${Math.max(0, alpha)})`;
        ctx.fill();
      }

      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  </script>
</body>
</html>
